services:
  - type: web
    name: ascend-atlas
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4
    envVars:
      - key: ATLAS_CODE
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.6"

  # For persistent data across deploys, upgrade to Starter ($7/mo) and add:
  # disk: { name: atlas-data, mountPath: /data, sizeGB: 1 }
  # env: ATLAS_DB_PATH=/data/atlas.db
