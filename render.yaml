services:
  - type: web
    name: ascend-atlas
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4
    envVars:
      - key: ATLAS_CODE
        sync: false
      - key: ATLAS_GITHUB_TOKEN
        sync: false
      - key: ATLAS_GITHUB_REPO
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.6"

# Auto-save: ATLAS_GITHUB_TOKEN + ATLAS_GITHUB_REPO=youruser/atlas-data
