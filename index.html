<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0612">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Atlas — Ascend Client OS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="login-screen" id="login-screen">
    <div class="login-card">
      <div class="brand">Atlas</div>
      <p class="login-hint" id="login-hint">Enter your Atlas access code.</p>
      <form id="login-form">
        <div class="field">
          <label for="login-code">Access Code</label>
          <input id="login-code" type="password" autocomplete="current-password" placeholder="Your code" required>
        </div>
        <p class="login-error" id="login-error"></p>
        <button class="btn btn-primary btn-block" type="submit">Enter Atlas</button>
      </form>
    </div>
  </div>

  <div id="app-shell">
  <header class="mobile-header">
    <div class="mobile-brand">Atlas</div>
  </header>

  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand">Atlas</div>
      <div class="brand-sub">Ascend Client OS</div>
      <nav class="nav">
        <a href="#/dashboard" data-nav="dashboard">Dashboard</a>
        <a href="#/clients" data-nav="clients">Clients</a>
        <a href="#/assets" data-nav="assets">Assets</a>
        <a href="#/requests" data-nav="requests">Update Requests</a>
        <a href="#/notes" data-nav="notes">Notes</a>
      </nav>
      <div class="sidebar-foot">
        <button type="button" class="foot-btn" id="sidebar-export">Export backup</button>
        <button type="button" class="foot-btn" id="sidebar-import">Import backup</button>
      </div>
    </aside>

    <main class="main" id="main-content"></main>
  </div>

  <nav class="bottom-nav" id="bottom-nav">
    <a href="#/dashboard" data-nav="dashboard">
      <span class="nav-icon" aria-hidden="true">◫</span>
      <span>Home</span>
    </a>
    <a href="#/clients" data-nav="clients">
      <span class="nav-icon" aria-hidden="true">◎</span>
      <span>Clients</span>
    </a>
    <a href="#/assets" data-nav="assets">
      <span class="nav-icon" aria-hidden="true">☑</span>
      <span>Assets</span>
    </a>
    <a href="#/requests" data-nav="requests">
      <span class="nav-icon" aria-hidden="true">↻</span>
      <span>Requests</span>
    </a>
    <a href="#/notes" data-nav="notes">
      <span class="nav-icon" aria-hidden="true">✎</span>
      <span>Notes</span>
    </a>
  </nav>
  </div>

  <input type="file" id="import-file" accept=".json,application/json" hidden>

  <div class="modal-backdrop" id="modal-backdrop">
    <div class="modal" role="dialog" aria-modal="true">
      <h3 id="modal-title">Modal</h3>
      <div id="modal-body"></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="modal-cancel" type="button">Cancel</button>
        <button class="btn btn-primary" id="modal-save" type="button">Save</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
