<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a2540">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Atlas">
  <title>Atlas — Ascend</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/static/apple-touch-icon-light.png" media="(prefers-color-scheme: light)">
  <link rel="apple-touch-icon" href="/static/apple-touch-icon-dark.png" media="(prefers-color-scheme: dark)">
  <link rel="apple-touch-icon" href="/static/apple-touch-icon-light.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/static/icon-192-light.png" media="(prefers-color-scheme: light)">
  <link rel="icon" type="image/png" sizes="192x192" href="/static/icon-192-dark.png" media="(prefers-color-scheme: dark)">
  <link rel="icon" type="image/png" sizes="192x192" href="/static/icon-192-light.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/static/icon-512-light.png" media="(prefers-color-scheme: light)">
  <link rel="icon" type="image/png" sizes="512x512" href="/static/icon-512-dark.png" media="(prefers-color-scheme: dark)">
  <link rel="stylesheet" href="css/styles.css">
  <script>
    (function () {
      if (localStorage.getItem('ascend_theme') === 'dark') {
        document.documentElement.dataset.theme = 'dark';
      }
    })();
  </script>
</head>
<body>
  <div class="login-screen" id="login-screen">
    <div class="login-card">
      <img class="brand-logo" src="/static/logo.svg" alt="Atlas" width="36" height="36">
      <div class="brand">Atlas</div>
      <p class="login-hint" id="login-hint">Enter your access code.</p>
      <form id="login-form">
        <div class="field">
          <label for="login-code">Access code</label>
          <input id="login-code" type="password" autocomplete="current-password" placeholder="Access code" required>
        </div>
        <p class="login-error" id="login-error"></p>
        <button class="btn btn-primary btn-block" type="submit" id="login-submit">Continue</button>
      </form>
    </div>
  </div>

  <div id="app-shell">
    <header class="mobile-header">
      <div class="mobile-brand"><img class="brand-logo sm" src="/static/logo.svg" alt="" width="24" height="24"> Atlas</div>
      <div class="theme-switch" role="group" aria-label="Appearance">
        <button type="button" data-theme-opt="light" aria-pressed="true"><span data-icon="sun" data-icon-size="14" class="theme-icon"></span></button>
        <button type="button" data-theme-opt="dark" aria-pressed="false"><span data-icon="moon" data-icon-size="14" class="theme-icon"></span></button>
      </div>
    </header>

    <div class="app">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
          <img class="brand-logo brand-logo--sidebar" src="/static/logo-light.svg" alt="Atlas" width="28" height="28">
          <div>
            <div class="brand">Atlas</div>
            <div class="brand-sub">Ascend OS</div>
          </div>
        </div>
        <nav class="nav">
          <div class="nav-section">Overview</div>
          <a href="#/dashboard" data-nav="dashboard"><span class="nav-icon" data-icon="dashboard" data-icon-size="18"></span>Dashboard</a>
          <a href="#/leads" data-nav="leads"><span class="nav-icon" data-icon="leads" data-icon-size="18"></span>Leads</a>
          <a href="#/analytics" data-nav="analytics"><span class="nav-icon" data-icon="analytics" data-icon-size="18"></span>Analytics</a>
          <div class="nav-section">Operations</div>
          <a href="#/clients" data-nav="clients"><span class="nav-icon" data-icon="clients" data-icon-size="18"></span>Clients</a>
          <a href="#/requests" data-nav="requests"><span class="nav-icon" data-icon="updates" data-icon-size="18"></span>Updates</a>
          <a href="#/assets" data-nav="assets"><span class="nav-icon" data-icon="assets" data-icon-size="18"></span>Assets</a>
          <a href="#/notes" data-nav="notes"><span class="nav-icon" data-icon="notes" data-icon-size="18"></span>Notes</a>
          <div class="nav-section">System</div>
          <a href="#/settings" data-nav="settings"><span class="nav-icon" data-icon="settings" data-icon-size="18"></span>Settings</a>
        </nav>
        <div class="sidebar-foot">
          <div class="theme-switch-label">Appearance</div>
          <div class="theme-switch" role="group" aria-label="Appearance">
            <button type="button" data-theme-opt="light" aria-pressed="true"><span data-icon="sun" data-icon-size="14" class="theme-icon"></span> Light</button>
            <button type="button" data-theme-opt="dark" aria-pressed="false"><span data-icon="moon" data-icon-size="14" class="theme-icon"></span> Dark</button>
          </div>
          <button type="button" class="foot-btn" id="sidebar-export"><span data-icon="export" data-icon-size="14" class="foot-icon"></span> Export backup</button>
          <button type="button" class="foot-btn" id="sidebar-import"><span data-icon="import" data-icon-size="14" class="foot-icon"></span> Import backup</button>
        </div>
      </aside>

      <main class="main" id="main-content"></main>
    </div>

    <nav class="bottom-nav" id="bottom-nav">
      <a href="#/dashboard" data-nav="dashboard"><span class="bottom-nav-icon" data-icon="home" data-icon-size="20"></span>Home</a>
      <a href="#/leads" data-nav="leads"><span class="bottom-nav-icon" data-icon="leads" data-icon-size="20"></span>Leads</a>
      <a href="#/clients" data-nav="clients"><span class="bottom-nav-icon" data-icon="clients" data-icon-size="20"></span>Clients</a>
      <a href="#/requests" data-nav="requests"><span class="bottom-nav-icon" data-icon="updates" data-icon-size="20"></span>Updates</a>
      <a href="#/settings" data-nav="settings"><span class="bottom-nav-icon" data-icon="more" data-icon-size="20"></span>More</a>
    </nav>
  </div>

  <input type="file" id="import-file" accept=".json,application/json" hidden>

  <div class="modal-backdrop" id="modal-backdrop">
    <div class="modal" role="dialog" aria-modal="true">
      <h3 id="modal-title">Modal</h3>
      <div id="modal-body"></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="modal-cancel" type="button"></button>
        <button class="btn btn-primary" id="modal-save" type="button"></button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initTheme } from './js/theme.js';
    import { hydrateIcons, withIcon } from './js/icons.js';
    initTheme();
    document.getElementById('modal-cancel').innerHTML = withIcon('cancel', 'Cancel');
    document.getElementById('modal-save').innerHTML = withIcon('save', 'Save');
    const loginBtn = document.getElementById('login-submit');
    if (loginBtn) loginBtn.innerHTML = withIcon('arrowRight', 'Continue');
    hydrateIcons();
  </script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
